<section class="login-page">
  <div class="gradient-layer"></div>
  <div class="network-layer" aria-hidden="true"></div>
  <div class="particle-layer" aria-hidden="true">
    <span class="particle" *ngFor="let particle of particles"></span>
  </div>

  <div class="login-card-modern relative z-10 w-full max-w-md rounded-2xl p-8 shadow-2xl backdrop-blur-xl">
    <div class="mb-6 space-y-2 text-center">
      <p class="login-eyebrow text-xs font-semibold uppercase tracking-[0.22em]">ZORVYN FINANCE</p>
      <h1 class="login-title text-3xl font-bold">Sign In</h1>
      <p class="login-subtitle text-sm">Use one of the demo credentials to continue.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLoginSubmit()" class="space-y-4">
      <label class="login-label block text-sm font-medium">
        Email
        <input
          type="email"
          formControlName="email"
          placeholder="name@company.com"
          autocomplete="email"
          class="login-input mt-1 w-full rounded-xl px-3 py-2.5 outline-none transition"
        />
      </label>

      <label class="login-label block text-sm font-medium">
        Password
        <input
          type="password"
          formControlName="password"
          placeholder="Enter password"
          autocomplete="current-password"
          class="login-input mt-1 w-full rounded-xl px-3 py-2.5 outline-none transition"
        />
      </label>

      @if (loginError) {
        <div class="login-error-banner rounded-xl px-3 py-2 text-sm font-medium">
          {{ loginError }}
        </div>
      }

      <button
        type="submit"
        [disabled]="isLoading"
        class="login-submit-btn w-full rounded-xl px-4 py-2.5 text-sm font-semibold transition hover:opacity-95 disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <div class="login-demo-box mt-6 rounded-xl p-4 text-xs">
      <p class="login-demo-title font-semibold">Demo credentials</p>
      <p class="mt-1">Admin: admin@zorvyn.com / admin123</p>
      <p>Viewer: viewer@zorvyn.com / viewer123</p>
    </div>
  </div>
</section>
